# The compose file to build and run the necessary containers
# This builds two containers: One for a node.js server and one for a
#   nginx website that can connect to the node.js servers using websockets.
# Navigate to this file and use this command to run the containers:
#   docker-compose up -d --build --force-recreate
# Use this command to stop them:
#   docker-compose down

services:
  #The website itself
  website:
    image: nginx:latest
    container_name: website
    volumes: 
      - "./website/code:/usr/share/nginx/html"
      - "./website/nginx.conf:/etc/nginx/conf.d/default.conf"
    ports:
      - 80:80
    restart: always
  #The Node.JS server connecting the website to the database
  server:
    build:
      context: /nodeserver
    container_name: server
    #volumes:
      #- "./nodeserver/package.json:package.json"
      #- "./nodeserver/code:/app"
    ports:
      - "3000:3000"
    restart: always
  #The database that stores everything
  # Use this command to log in once inside the container:
  #   mysql --user=root --password
  # Once properly set up, use the information in docs/DatabaseDesign.md
  #   initialize the database
  db:
    image: mysql:latest
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: testytests
    ports:
      - "3306:3306"
    volumes:
      # Make MySql write to the computer
      - "./mysqldatabase/data:/var/lib/mysql"